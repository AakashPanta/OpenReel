                  services/api/internal/auth/service.go \
                  services/api/internal/auth/handlers.go \
                  services/api/internal/feed/service.go \
                  services/api/internal/feed/handlers.go \
                  services/api/internal/uploads/service.go \
                  services/api/internal/uploads/handlers.go \
                  services/api/internal/httpx/router.go \
                  services/api/openapi/openreel-api.yaml \
                  .env.example

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Apply PeerTube adapter scaffold"
          git push
