              "services/api/internal/feed/handlers.go": r'''package feed

          import (
          	"net/http"

          	"github.com/AakashPanta/OpenReel/services/api/internal/common"
          )

          type Handler struct {
          	service *Service
          }

          func NewHandler(service *Service) *Handler {
          	return &Handler{service: service}
          }

          func (h *Handler) GetFeed(w http.ResponseWriter, r *http.Request) {
          	resp, err := h.service.Get(
          		r.Context(),
          		r.URL.Query().Get("tab"),
          		r.URL.Query().Get("cursor"),
          	)
          	if err != nil {
          		common.WriteJSON(w, http.StatusBadGateway, map[string]string{
          			"error": err.Error(),
          		})
          		return
          	}

          	common.WriteJSON(w, http.StatusOK, resp)
          }
          ''',

              "services/api/internal/uploads/service.go": r'''package uploads

          import (
          	"context"
          	"fmt"
          	"strconv"
          	"strings"
          	"time"

          	"github.com/AakashPanta/OpenReel/services/api/internal/config"
          	"github.com/AakashPanta/OpenReel/services/api/internal/peertube"
          	"github.com/google/uuid"
          )

          type Service struct {
          	cfg      config.Config
          	peerTube *peertube.Client
          }

          type CreateUploadRequest struct {
          	FileName    string `json:"file_name"`
          	ContentType string `json:"content_type"`
          	SizeBytes   int64  `json:"size_bytes"`
          }

          type CreateUploadResponse struct {
          	UploadID          string            `json:"upload_id"`
          	UploadURL         string            `json:"upload_url"`
          	TusHeaders        map[string]string `json:"tus_headers"`
          	DraftVideoID      string            `json:"draft_video_id"`
          	Status            string            `json:"status"`
          	ExpiresAt         time.Time         `json:"expires_at"`
          	ProcessingWebhook string            `json:"processing_webhook"`
          	Provider          string            `json:"provider"`
          }

          func NewService(cfg config.Config, peerTube *peertube.Client) *Service {
          	return &Service{
          		cfg:      cfg,
          		peerTube: peerTube,
          	}
          }

          func (s *Service) Create(ctx context.Context, req CreateUploadRequest) (CreateUploadResponse, error) {
          	if !s.peerTube.Enabled() || s.cfg.PeerTubeUsername == "" || s.cfg.PeerTubePassword == "" || s.cfg.PeerTubeChannelID == "" {
          		return s.mockCreate(req), nil
          	}

          	channelID, err := strconv.Atoi(s.cfg.PeerTubeChannelID)
          	if err != nil {
          		return CreateUploadResponse{}, fmt.Errorf("invalid PEERTUBE_CHANNEL_ID: %w", err)
          	}

          	token, err := s.login(ctx)
          	if err != nil {
          		return CreateUploadResponse{}, err
          	}

          	title := titleFromFilename(req.FileName)

          	initResp, err := s.peerTube.InitializeResumableUpload(
          		ctx,
          		token.AccessToken,
          		req.SizeBytes,
          		req.ContentType,
          		peertube.InitResumableUploadRequest{
          			ChannelID: channelID,
          			Filename:  req.FileName,
          			Name:      title,
          			Privacy:   1,
          		},
          	)
          	if err != nil {
          		return CreateUploadResponse{}, err
          	}

          	uploadID := initResp.UploadID
          	if uploadID == "" {
          		uploadID = uuid.NewString()
          	}

          	draftID := "peertube_draft_" + strings.ReplaceAll(uuid.NewString(), "-", "")[:12]

          	return CreateUploadResponse{
          		UploadID:     uploadID,
          		UploadURL:    initResp.UploadURL,
          		DraftVideoID: draftID,
          		Status:       "uploading",
          		ExpiresAt:    time.Now().UTC().Add(1 * time.Hour),
          		TusHeaders: map[string]string{
          			"Authorization":          "Bearer " + token.AccessToken,
          			"X-Upload-Content-Length": fmt.Sprintf("%d", req.SizeBytes),
          			"X-Upload-Content-Type":   req.ContentType,
          			"Content-Type":            "application/octet-stream",
          		},
          		ProcessingWebhook: fmt.Sprintf("%s/internal/uploads/%s/complete", strings.TrimRight(s.cfg.PublicBaseURL, "/"), uploadID),
          		Provider:          "peertube",
          	}, nil
          }

          func (s *Service) login(ctx context.Context) (peertube.TokenResponse, error) {
          	client, err := s.peerTube.GetLocalOAuthClient(ctx)
          	if err != nil {
          		return peertube.TokenResponse{}, err
          	}

          	return s.peerTube.PasswordLogin(
          		ctx,
          		client.ClientID,
          		client.ClientSecret,
          		s.cfg.PeerTubeUsername,
          		s.cfg.PeerTubePassword,
          		s.cfg.PeerTubeTokenScope,
          	)
          }

          func (s *Service) mockCreate(req CreateUploadRequest) CreateUploadResponse {
          	uploadID := uuid.NewString()
          	draftID := "draft_" + strings.ReplaceAll(uuid.NewString(), "-", "")[:12]

          	return CreateUploadResponse{
          		UploadID:     uploadID,
          		UploadURL:    fmt.Sprintf("%s/api/v1/videos/upload-resumable?upload_id=%s", "https://peertube.local", uploadID),
          		DraftVideoID: draftID,
          		Status:       "uploading",
          		ExpiresAt:    time.Now().UTC().Add(24 * time.Hour),
          		TusHeaders: map[string]string{
          			"Content-Type":            "application/octet-stream",
          			"X-Upload-Content-Length": fmt.Sprintf("%d", req.SizeBytes),
          			"X-Upload-Content-Type":   req.ContentType,
          		},
          		ProcessingWebhook: fmt.Sprintf("%s/internal/uploads/%s/complete", strings.TrimRight(s.cfg.PublicBaseURL, "/"), uploadID),
          		Provider:          "mock",
          	}
          }

          func titleFromFilename(filename string) string {
          	name := filename
          	if dot := strings.LastIndexByte(name, '.'); dot > 0 {
          		name = name[:dot]
          	}
          	name = strings.ReplaceAll(name, "-", " ")
          	name = strings.ReplaceAll(name, "_", " ")
          	name = strings.TrimSpace(name)
          	if name == "" {
          		return "OpenReel upload"
          	}
          	return name
          }
          ''',

              "services/api/internal/uploads/handlers.go": r'''package uploads

          import (
          	"encoding/json"
          	"net/http"

          	"github.com/AakashPanta/OpenReel/services/api/internal/common"
          )

          type Handler struct {
          	service *Service
          }

          func NewHandler(service *Service) *Handler {
          	return &Handler{service: service}
          }

          func (h *Handler) CreateUpload(w http.ResponseWriter, r *http.Request) {
          	var req CreateUploadRequest
          	if err := json.NewDecoder(r.Body).Decode(&req); err != nil {
          		common.WriteJSON(w, http.StatusBadRequest, map[string]string{
          			"error": "invalid json body",
          		})
          		return
          	}

          	if req.FileName == "" || req.SizeBytes <= 0 {
          		common.WriteJSON(w, http.StatusBadRequest, map[string]string{
          			"error": "file_name and size_bytes are required",
          		})
          		return
          	}

          	resp, err := h.service.Create(r.Context(), req)
          	if err != nil {
          		common.WriteJSON(w, http.StatusBadGateway, map[string]string{
          			"error": err.Error(),
          		})
          		return
          	}

          	common.WriteJSON(w, http.StatusCreated, resp)
          }
          ''',

              "services/api/internal/httpx/router.go": r'''package httpx

          import (
          	"net/http"
          	"time"

          	"github.com/AakashPanta/OpenReel/services/api/internal/auth"
          	"github.com/AakashPanta/OpenReel/services/api/internal/common"
          	"github.com/AakashPanta/OpenReel/services/api/internal/config"
          	"github.com/AakashPanta/OpenReel/services/api/internal/feed"
          	"github.com/AakashPanta/OpenReel/services/api/internal/uploads"
          	"github.com/go-chi/chi/v5"
          	"github.com/go-chi/chi/v5/middleware"
          )

          func NewRouter(
          	cfg config.Config,
          	authService *auth.Service,
          	feedService *feed.Service,
          	uploadService *uploads.Service,
          ) http.Handler {
          	r := chi.NewRouter()
          	r.Use(middleware.RequestID)
          	r.Use(middleware.RealIP)
          	r.Use(middleware.Recoverer)
          	r.Use(middleware.Timeout(30 * time.Second))

          	authHandler := auth.NewHandler(authService)
          	feedHandler := feed.NewHandler(feedService)
          	uploadHandler := uploads.NewHandler(uploadService)

          	r.Get("/healthz", func(w http.ResponseWriter, r *http.Request) {
          		common.WriteJSON(w, http.StatusOK, map[string]any{
          			"status":   "ok",
          			"service":  "openreel-api",
          			"env":      cfg.AppEnv,
          			"peertube": cfg.PeerTubeBaseURL != "",
          		})
          	})

          	r.Route("/v1", func(r chi.Router) {
          		r.Post("/auth/login", authHandler.Login)
          		r.Get("/feed", feedHandler.GetFeed)
          		r.Post("/uploads/create", uploadHandler.CreateUpload)
          	})

          	return r
          }
          ''',

              "services/api/openapi/openreel-api.yaml": r'''openapi: 3.1.0
          info:
            title: OpenReel API
            version: 0.2.0
            description: OpenReel mobile adapter scaffold on top of PeerTube.
          servers:
            - url: http://localhost:8080

          paths:
            /healthz:
              get:
                operationId: healthz
                responses:
                  "200":
                    description: Service health

            /v1/auth/login:
              post:
                operationId: login
                requestBody:
                  required: true
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/LoginRequest"
                responses:
                  "200":
                    description: PeerTube-backed login success
                    content:
                      application/json:
                        schema:
                          $ref: "#/components/schemas/LoginResponse"

            /v1/feed:
              get:
                operationId: getFeed
                parameters:
                  - in: query
                    name: tab
                    schema:
                      type: string
                      enum: [for_you, following]
                  - in: query
                    name: cursor
                    schema:
                      type: string
                responses:
                  "200":
                    description: Feed page
                    content:
                      application/json:
                        schema:
                          $ref: "#/components/schemas/FeedResponse"

            /v1/uploads/create:
              post:
                operationId: createUpload
                requestBody:
                  required: true
                  content:
                    application/json:
                      schema:
                        $ref: "#/components/schemas/CreateUploadRequest"
                responses:
                  "201":
                    description: PeerTube-backed resumable upload session created
                    content:
                      application/json:
                        schema:
                          $ref: "#/components/schemas/CreateUploadResponse"

          components:
            schemas:
              LoginRequest:
                type: object
                properties:
                  username:
                    type: string
                  password:
                    type: string

              LoginResponse:
                type: object
                properties:
                  provider:
                    type: string
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
                  scope:
                    type: string

              FeedResponse:
                type: object
                properties:
                  tab:
                    type: string
                  cursor:
                    type: string
                  next_cursor:
                    type: string
                  generated_at:
                    type: string
                    format: date-time
                  explanation:
                    type: array
                    items:
                      type: string
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FeedItem"

              FeedItem:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  caption:
                    type: string
                  playback_url:
                    type: string
                  thumbnail_url:
                    type: string
                  duration_sec:
                    type: integer
                  tags:
                    type: array
                    items:
                      type: string
                  creator:
                    $ref: "#/components/schemas/FeedCreator"
                  stats:
                    $ref: "#/components/schemas/FeedStats"
                  reasons:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReasonLabel"

              FeedCreator:
                type: object
                properties:
                  id:
                    type: string
                  display_name:
                    type: string
                  handle:
                    type: string
                  verified:
                    type: boolean

              FeedStats:
                type: object
                properties:
                  likes:
                    type: integer
                  comments:
                    type: integer
                  shares:
                    type: integer
                  saves:
                    type: integer

              ReasonLabel:
                type: object
                properties:
                  code:
                    type: string
                  label:
                    type: string

              CreateUploadRequest:
                type: object
                required: [file_name, size_bytes]
                properties:
                  file_name:
                    type: string
                  content_type:
                    type: string
                  size_bytes:
                    type: integer
                    format: int64

              CreateUploadResponse:
                type: object
                properties:
                  upload_id:
                    type: string
                  upload_url:
                    type: string
                  provider:
                    type: string
                  tus_headers:
                    type: object
                    additionalProperties:
                      type: string
                  draft_video_id:
                    type: string
                  status:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
                  processing_webhook:
                    type: string
          ''',
          }

          for path_str, content in files.items():
              path = Path(path_str)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content.strip() + "\n", encoding="utf-8")

          env_path = Path(".env.example")
          env_text = env_path.read_text(encoding="utf-8") if env_path.exists() else ""
          additions = [
              "PEERTUBE_BASE_URL=http://localhost:9000",
              "PEERTUBE_USERNAME=",
              "PEERTUBE_PASSWORD=",
              "PEERTUBE_CHANNEL_ID=",
              "PEERTUBE_TOKEN_SCOPE=user",
          ]
          for line in additions:
              if line not in env_text:
                  if env_text and not env_text.endswith("\n"):
                      env_text += "\n"
                  env_text += line + "\n"
          env_path.write_text(env_text, encoding="utf-8")

          print("PeerTube adapter scaffold written successfully.")
          PY

      - name: Show changed files
        run: git status --short

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add services/api/cmd/server/main.go \
                  services/api/internal/config/config.go \
