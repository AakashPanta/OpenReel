name: Apply OpenReel Fix

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure directories exist
        shell: bash
        run: |
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/values-night
          mkdir -p .github/workflows

      - name: Replace app/build.gradle.kts
        shell: bash
        run: |
          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.plugin.compose")
          }

          android {
              namespace = "com.openreel.app"
              compileSdk = 36

              defaultConfig {
                  applicationId = "com.openreel.app"
                  minSdk = 26
                  targetSdk = 36
                  versionCode = 1
                  versionName = "1.0"
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(
                          getDefaultProguardFile("proguard-android-optimize.txt"),
                          "proguard-rules.pro"
                      )
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              buildFeatures {
                  compose = true
              }

              packaging {
                  resources {
                      excludes += "/META-INF/{AL2.0,LGPL2.1}"
                  }
              }
          }

          dependencies {
              val composeBom = platform("androidx.compose:compose-bom:2025.12.00")

              implementation(composeBom)
              androidTestImplementation(composeBom)

              implementation("androidx.core:core-ktx:1.18.0")
              implementation("androidx.activity:activity-compose:1.11.0")
              implementation("androidx.lifecycle:lifecycle-runtime-compose:2.9.4")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.9.4")
              implementation("androidx.navigation:navigation-compose:2.9.7")

              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.foundation:foundation")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material-icons-extended")

              implementation("com.google.android.material:material:1.13.0")

              debugImplementation("androidx.compose.ui:ui-tooling")
              debugImplementation("androidx.compose.ui:ui-test-manifest")
          }
          EOF

      - name: Replace AndroidManifest.xml
        shell: bash
        run: |
          cat > app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.OpenReel">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:theme="@style/Theme.OpenReel">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

              </application>

          </manifest>
          EOF

      - name: Replace day theme
        shell: bash
        run: |
          cat > app/src/main/res/values/themes.xml <<'EOF'
          <resources>
              <style name="Theme.OpenReel" parent="Theme.Material3.Light.NoActionBar">
                  <item name="android:statusBarColor">@android:color/transparent</item>
                  <item name="android:navigationBarColor">@android:color/black</item>
                  <item name="android:windowLightStatusBar">true</item>
                  <item name="android:windowLightNavigationBar">false</item>
              </style>
          </resources>
          EOF

      - name: Replace night theme
        shell: bash
        run: |
          cat > app/src/main/res/values-night/themes.xml <<'EOF'
          <resources>
              <style name="Theme.OpenReel" parent="Theme.Material3.Dark.NoActionBar">
                  <item name="android:statusBarColor">@android:color/transparent</item>
                  <item name="android:navigationBarColor">@android:color/black</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:windowLightNavigationBar">false</item>
              </style>
          </resources>
          EOF

      - name: Replace build-debug-apk workflow
        shell: bash
        run: |
          cat > .github/workflows/build-debug-apk.yml <<'EOF'
          name: Build Debug APK

          on:
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            build:
              runs-on: ubuntu-latest

              steps:
                - name: Checkout repository
                  uses: actions/checkout@v4

                - name: Set up JDK 17
                  uses: actions/setup-java@v4
                  with:
                    distribution: temurin
                    java-version: "17"

                - name: Make gradlew executable
                  run: chmod +x gradlew

                - name: Prepare log directory
                  run: mkdir -p build-logs

                - name: Save environment info
                  shell: bash
                  run: |
                    {
                      echo "Repository: $GITHUB_REPOSITORY"
                      echo "Ref: $GITHUB_REF"
                      echo "SHA: $GITHUB_SHA"
                      echo "Runner: $RUNNER_OS"
                      echo "Java:"
                      java -version
                      echo
                      echo "Gradle wrapper properties:"
                      cat gradle/wrapper/gradle-wrapper.properties
                    } > build-logs/environment.txt 2>&1

                - name: Save Gradle version output
                  shell: bash
                  run: |
                    set -o pipefail
                    ./gradlew --version 2>&1 | tee build-logs/gradle-version.txt

                - name: Build debug APK
                  shell: bash
                  run: |
                    set -o pipefail
                    ./gradlew clean assembleDebug --stacktrace --info --no-daemon 2>&1 | tee build-logs/gradle-build.log

                - name: Collect extra reports
                  if: always()
                  shell: bash
                  run: |
                    mkdir -p build-logs/extra

                    if [ -d "app/build/reports" ]; then
                      cp -R app/build/reports build-logs/extra/reports
                    fi

                    if [ -d "app/build/outputs/logs" ]; then
                      cp -R app/build/outputs/logs build-logs/extra/outputs-logs
                    fi

                    if [ -f "app/build/intermediates/merged_manifests/debug/processDebugMainManifest/AndroidManifest.xml" ]; then
                      cp "app/build/intermediates/merged_manifests/debug/processDebugMainManifest/AndroidManifest.xml" \
                         "build-logs/extra/merged-debug-manifest.xml"
                    fi

                - name: Upload build logs
                  if: always()
                  uses: actions/upload-artifact@v4
                  with:
                    name: openreel-build-logs
                    path: build-logs
                    if-no-files-found: error

                - name: Upload debug APK
                  if: success()
                  uses: actions/upload-artifact@v4
                  with:
                    name: openreel-debug-apk
                    path: app/build/outputs/apk/debug/*.apk
                    if-no-files-found: error
          EOF

      - name: Commit and push changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add app/build.gradle.kts \
                  app/src/main/AndroidManifest.xml \
                  app/src/main/res/values/themes.xml \
                  app/src/main/res/values-night/themes.xml \
                  .github/workflows/build-debug-apk.yml \
                  .github/workflows/apply-openreel-fix.yml

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Apply OpenReel theme and build workflow fix"
          git push
