name: Fix AGP 9 Kotlin Setup and Add Gradle Wrapper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-and-add-wrapper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Rewrite top-level build.gradle.kts
        shell: bash
        run: |
          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "9.1.1" apply false
              id("org.jetbrains.kotlin.plugin.compose") version "2.3.20" apply false
          }
          EOF

      - name: Rewrite app/build.gradle.kts
        shell: bash
        run: |
          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.plugin.compose")
          }

          android {
              namespace = "com.openreel.app"
              compileSdk = 36

              defaultConfig {
                  applicationId = "com.openreel.app"
                  minSdk = 26
                  targetSdk = 36
                  versionCode = 1
                  versionName = "1.0"
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                      proguardFiles(
                          getDefaultProguardFile("proguard-android-optimize.txt"),
                          "proguard-rules.pro"
                      )
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              buildFeatures {
                  compose = true
              }

              packaging {
                  resources {
                      excludes += "/META-INF/{AL2.0,LGPL2.1}"
                  }
              }
          }

          dependencies {
              val composeBom = platform("androidx.compose:compose-bom:2025.12.00")

              implementation(composeBom)
              androidTestImplementation(composeBom)

              implementation("androidx.core:core-ktx:1.18.0")
              implementation("androidx.activity:activity-compose:1.11.0")
              implementation("androidx.lifecycle:lifecycle-runtime-compose:2.9.4")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.9.4")
              implementation("androidx.navigation:navigation-compose:2.9.7")

              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.foundation:foundation")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material-icons-extended")

              debugImplementation("androidx.compose.ui:ui-tooling")
              debugImplementation("androidx.compose.ui:ui-test-manifest")
          }
          EOF

      - name: Download Gradle 9.3.1
        shell: bash
        run: |
          set -euo pipefail
          curl -L --fail --retry 3 \
            https://services.gradle.org/distributions/gradle-9.3.1-bin.zip \
            -o gradle-9.3.1-bin.zip
          unzip -q gradle-9.3.1-bin.zip

      - name: Generate Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          ./gradle-9.3.1/bin/gradle wrapper \
            --gradle-version 9.3.1 \
            --distribution-type bin \
            --no-daemon
          chmod +x gradlew

      - name: Clean temporary files
        shell: bash
        run: |
          rm -rf gradle-9.3.1
          rm -f gradle-9.3.1-bin.zip

      - name: Verify wrapper files
        shell: bash
        run: |
          test -f gradlew
          test -f gradlew.bat
          test -f gradle/wrapper/gradle-wrapper.jar
          test -f gradle/wrapper/gradle-wrapper.properties

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add build.gradle.kts app/build.gradle.kts gradlew gradlew.bat gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties .github/workflows/add-gradle-wrapper.yml

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Fix AGP 9 Kotlin setup and add Gradle wrapper"
          git push
