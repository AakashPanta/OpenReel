name: Add Gradle Wrapper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-wrapper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download Gradle 9.3.1
        shell: bash
        run: |
          set -euo pipefail
          curl -L --fail --retry 3 \
            https://services.gradle.org/distributions/gradle-9.3.1-bin.zip \
            -o gradle-9.3.1-bin.zip
          unzip -q gradle-9.3.1-bin.zip

      - name: Generate Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          ./gradle-9.3.1/bin/gradle wrapper \
            --gradle-version 9.3.1 \
            --distribution-type bin \
            --no-daemon
          chmod +x gradlew

      - name: Clean temporary files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf gradle-9.3.1
          rm -f gradle-9.3.1-bin.zip

      - name: Verify wrapper files
        shell: bash
        run: |
          set -euo pipefail
          test -f gradlew
          test -f gradlew.bat
          test -f gradle/wrapper/gradle-wrapper.jar
          test -f gradle/wrapper/gradle-wrapper.properties

      - name: Commit and push wrapper files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add gradlew gradlew.bat gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties

          if git diff --cached --quiet; then
            echo "No wrapper changes to commit."
            exit 0
          fi

          git commit -m "Add Gradle wrapper files"
          git push
