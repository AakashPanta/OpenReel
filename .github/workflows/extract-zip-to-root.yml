name: Extract ZIP to Repo Root

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Path to the ZIP file inside the repository"
        required: true
        default: "OpenReel-android-mvp.zip"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip rsync

      - name: Extract ZIP to repo root and clean up
        shell: bash
        run: |
          set -euo pipefail

          ZIP_PATH="${{ github.event.inputs.zip_path }}"

          if [ ! -f "$ZIP_PATH" ]; then
            echo "ZIP file not found: $ZIP_PATH"
            echo "Make sure the file exists in the repository before running this workflow."
            exit 1
          fi

          TEMP_DIR="$(mktemp -d)"
          EXTRACT_DIR="$TEMP_DIR/extracted"
          mkdir -p "$EXTRACT_DIR"

          echo "Unzipping: $ZIP_PATH"
          unzip -q "$ZIP_PATH" -d "$EXTRACT_DIR"

          echo "Removing junk files from extracted content"
          find "$EXTRACT_DIR" -name "__MACOSX" -type d -prune -exec rm -rf {} +
          find "$EXTRACT_DIR" -name ".DS_Store" -type f -delete

          TOP_ITEMS=$(find "$EXTRACT_DIR" -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')

          if [ "$TOP_ITEMS" = "1" ]; then
            ONLY_ITEM="$(find "$EXTRACT_DIR" -mindepth 1 -maxdepth 1)"
            if [ -d "$ONLY_ITEM" ]; then
              SOURCE_DIR="$ONLY_ITEM"
            else
              SOURCE_DIR="$EXTRACT_DIR"
            fi
          else
            SOURCE_DIR="$EXTRACT_DIR"
          fi

          echo "Cleaning repository root except .git and .github"
          find . -mindepth 1 -maxdepth 1 \
            ! -name ".git" \
            ! -name ".github" \
            -exec rm -rf {} +

          echo "Copying extracted files into repository root"
          rsync -a "$SOURCE_DIR"/ ./

          echo "Removing junk files after copy"
          find . -name "__MACOSX" -type d -prune -exec rm -rf {} +
          find . -name ".DS_Store" -type f -delete

          echo "Removing source ZIP if still present"
          rm -f "$ZIP_PATH" || true

          echo "Cleaning temporary directory"
          rm -rf "$TEMP_DIR"

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add -A
          git commit -m "Extract ZIP to repo root and clean repository"
          git push
